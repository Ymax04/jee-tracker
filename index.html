<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JEE 2026 Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000000; 
            color: #ffffff; 
            margin: 0; 
            overflow-y: auto; 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        #loader {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 0.4s ease;
        }
        .loader-text { color: #444; font-size: 11px; text-transform: uppercase; letter-spacing: 3px; }

        .progress-sub { color: #666; font-size: 11px; margin-bottom: 5px; }
        .progress-bar-bg { background: #111; height: 1px; width: 100%; }
        .progress-bar-fill { background: #ffffff; height: 1px; transition: width 0.8s ease; }

        .table-wrapper { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { border-collapse: separate; border-spacing: 0; width: 100%; }

        .sticky-nav {
            position: sticky; top: 0; background: #000; z-index: 110;
            border-bottom: 1px solid #111;
        }

        thead th {
            position: sticky; top: 48px; z-index: 100;
            background-color: #000 !important; color: #444; font-weight: 500; 
            font-size: 9px; text-transform: uppercase; padding: 15px 10px; 
            border-bottom: 1px solid #111; text-align: center;
        }

        .topic-col { text-align: left !important; min-width: 220px; }
        tbody td { padding: 15px 10px; border-bottom: 1px solid #0a0a0a; font-size: 13px; color: #999; text-align: center; }

        .category-row td {
            background-color: #000; color: #333; font-size: 10px;
            text-transform: uppercase; letter-spacing: 1px; padding: 35px 10px 10px;
            text-align: left; border: none;
        }

        .cb {
            appearance: none; width: 16px; height: 16px; border: 1px solid #222;
            border-radius: 2px; cursor: pointer; transition: 0.2s; position: relative;
        }
        .cb:checked { background: #ffffff; border-color: #ffffff; }
        .cb:checked::after {
            content: ''; position: absolute; left: 5px; top: 2px;
            width: 4px; height: 8px; border: solid #000;
            border-width: 0 2px 2px 0; transform: rotate(45deg);
        }

        .tab-btn { color: #444; font-size: 12px; font-weight: 500; padding: 15px 20px; transition: 0.3s; }
        .tab-btn.active { color: #fff; border-bottom: 1px solid #fff; }

        /* Mock Input Styling */
        .mock-input {
            background: transparent; border: 1px solid #111; color: #fff;
            padding: 8px; font-size: 12px; width: 100%; text-align: center;
            border-radius: 2px; outline: none;
        }
        .mock-input:focus { border-color: #444; }
        .history-card { border: 1px solid #111; padding: 20px; margin-top: 20px; background: #050505; }
    </style>
</head>
<body class="pb-20">

    <div id="loader"><div class="loader-text">LOADING</div></div>

    <header class="p-8 max-w-5xl mx-auto mt-6">
        <div class="flex justify-between items-center mb-12">
            <h1 class="text-[10px] font-medium tracking-[0.4em] text-gray-500 uppercase">JEE 2026</h1>
            <div class="flex gap-8">
                <span onclick="showSection('tracker')" class="text-[9px] text-gray-700 uppercase tracking-widest cursor-pointer hover:text-white">Focus</span>
                <span onclick="showSection('history')" class="text-[9px] text-gray-400 uppercase tracking-widest cursor-pointer hover:text-white">History</span>
            </div>
        </div>

        <div id="top-progress-bars" class="grid grid-cols-1 md:grid-cols-3 gap-12">
            <div>
                <div class="flex justify-between progress-sub"><span>Mathematics</span><span id="math-perc">0%</span></div>
                <div class="progress-bar-bg"><div id="math-bar" class="progress-bar-fill" style="width: 0%"></div></div>
            </div>
            <div>
                <div class="flex justify-between progress-sub"><span>Physics</span><span id="physics-perc">0%</span></div>
                <div class="progress-bar-bg"><div id="physics-bar" class="progress-bar-fill" style="width: 0%"></div></div>
            </div>
            <div>
                <div class="flex justify-between progress-sub"><span>Chemistry</span><span id="chemistry-perc">0%</span></div>
                <div class="progress-bar-bg"><div id="chem-bar" class="progress-bar-fill" style="width: 0%"></div></div>
            </div>
        </div>
    </header>

    <div id="section-tracker">
        <nav class="sticky-nav flex justify-center gap-4 md:gap-12 max-w-5xl mx-auto px-4">
            <button onclick="switchTab('math')" id="tab-math" class="tab-btn active">Mathematics</button>
            <button onclick="switchTab('physics')" id="tab-physics" class="tab-btn">Physics</button>
            <button onclick="switchTab('chemistry')" id="tab-chemistry" class="tab-btn">Chemistry</button>
        </nav>
        <main class="max-w-5xl mx-auto px-4">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th class="w-10">#</th><th class="topic-col">Topic Name</th><th>Status</th><th>PYQ(B)</th><th>PYQ(M)</th><th>Test</th><th>Rev 1</th><th>Rev 2</th><th>Form</th>
                        </tr>
                    </thead>
                    <tbody id="tracker-body"></tbody>
                </table>
            </div>
        </main>
    </div>

    <div id="section-history" class="hidden max-w-5xl mx-auto px-8">
        <h2 class="text-[10px] text-gray-600 uppercase tracking-widest mb-6">Mock Test History</h2>
        
        <div class="grid grid-cols-4 gap-4 mb-8">
            <input type="number" id="m-score" placeholder="Math" class="mock-input">
            <input type="number" id="p-score" placeholder="Physics" class="mock-input">
            <input type="number" id="c-score" placeholder="Chem" class="mock-input">
            <button onclick="addMockResult()" class="text-[10px] border border-gray-800 hover:bg-white hover:text-black transition uppercase">Add Record</button>
        </div>

        <div class="history-card">
            <canvas id="scoreChart" height="100"></canvas>
        </div>

        <div class="mt-8 table-wrapper">
            <table class="text-[11px] text-gray-500">
                <thead>
                    <tr><th>Mock #</th><th>Math</th><th>Phys</th><th>Chem</th><th>Total</th><th>Date</th></tr>
                </thead>
                <tbody id="mock-history-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const fullData = {
            math: { "Category 1": ["Matrices And Determinants", "Sequence And Series", "Straight Line", "Probability", "Complex Numbers", "Functions", "Indefinite Integration", "Mathematical Reasoning", "Statistics"], "Category 2": ["Vector 3D", "Binomial Theorem", "Application Of Derivatives", "Circle", "Definite Integration", "Differential Equation", "Parabola", "Area Under Curves", "Quadratic Equations", "Vector", "Limits"], "Category 3": ["Continutity And Differentiability", "Hyperbola", "Trigonometrical Ratios", "Heights And Distances", "Trigonometrical Equations", "Set Theory And Relations"], "Category 4": ["Permutation And Combination", "Ellipse", "Differentiation", "Inverse Trigonometric Functions", "Solution Of Triangle"] },
            physics: { "Category 1": ["Current Electricity", "Semiconductors", "Thermal Properties Of Matter", "Calorimetry", "Kinetic Theory Of Gases", "Properties Of Matter", "Fluid Mechanics", "Capacitance", "Gravitation", "Units And Dimensions", "Alternating Current", "Communication System"], "Category 2": ["Photoelectric Effect", "Electrostatics", "Rotational Motion", "Electromagnetic Waves", "Ray Optics", "Waves And Sound", "Oscillations", "Magnetic Effects Of Current", "Electromagnetic Induction", "Center Of Mass And Momentum"], "Category 3": ["Wave Optics", "Atomic Physics", "Work Power Energy", "Nuclear Physics", "Motion in Two Dimension", "Laws Of Motion"], "Category 4": ["Experimental Physics", "Motion In One Dimension", "Magnetism", "Heat Transfer", "Circular Motion", "Mathematics In Physics"] },
            chemistry: { "Category 1": ["Biomolecules", "Polymers", "P Block Elements", "Environmental Chemistry", "S Block & Hydrogen", "Mole Concept", "Surface Chemistry", "Atomic Structure", "Electrochemistry", "Metallurgy", "Solutions"], "Category 2": ["Coordination Compounds", "Chemical Thermodynamics", "General Organic Chemistry", "Hydrocarbons", "Haloalkanes", "Aldehydes And Ketones", "Amines", "Chemical Kinetics", "Chemical Bonding", "d and f block elements", "Haloarenes And Phenols"], "Category 3": ["Periodicity", "Solid State", "Gaseous State", "Purification Of Organic Compounds", "Chemistry in Everyday Life", "Chemical Equilibrium"], "Category 4": ["Alcohols Phenols And Ethers", "Carboxylic Acid And Its Derivatives", "Ionic Equilibrium", "Aromatic Compounds", "Redox Reactions", "Qualitative Inorganic Chemistry"] }
        };

        const cols = ['st', 'pb', 'pm', 'ts', 'r1', 'r2', 'fr'];
        let currentSub = 'math';
        let mockResults = JSON.parse(localStorage.getItem('mockHistory') || '[]');

        function hideLoader() { document.getElementById('loader').style.opacity = '0'; setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 400); }
        window.addEventListener('load', hideLoader);
        setTimeout(hideLoader, 2000); 

        function showSection(sec) {
            document.getElementById('section-tracker').classList.toggle('hidden', sec !== 'tracker');
            document.getElementById('section-history').classList.toggle('hidden', sec !== 'history');
            if(sec === 'history') renderHistory();
        }

        function switchTab(sub) {
            currentSub = sub;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${sub}`).classList.add('active');
            renderTable();
        }

        function renderTable() {
            const body = document.getElementById('tracker-body');
            body.innerHTML = '';
            let count = 1;
            for (const [cat, topics] of Object.entries(fullData[currentSub])) {
                body.insertAdjacentHTML('beforeend', `<tr class="category-row"><td colspan="9">${cat}</td></tr>`);
                topics.forEach(topic => {
                    const rowId = `${currentSub}-${count}`;
                    let rowHtml = `<tr><td style="color:#222">${count}</td><td class="topic-col" style="color:#bbb">${topic}</td>`;
                    cols.forEach(col => {
                        const checkId = `${rowId}-${col}`;
                        rowHtml += `<td><input type="checkbox" ${localStorage.getItem(checkId) === 'true' ? 'checked' : ''} class="cb" onchange="save('${checkId}', this.checked)"></td>`;
                    });
                    body.insertAdjacentHTML('beforeend', rowHtml + `</tr>`);
                    count++;
                });
            }
            updateStats();
        }

        function save(id, val) { localStorage.setItem(id, val); updateStats(); }

        function updateStats() {
            ['math', 'physics', 'chemistry'].forEach(s => {
                let done = 0, total = 0;
                Object.values(fullData[s]).forEach(l => total += l.length * cols.length);
                for (let i = 0; i < localStorage.length; i++) {
                    if (localStorage.key(i).startsWith(s + '-') && localStorage.getItem(localStorage.key(i)) === 'true') done++;
                }
                const p = Math.round((done / total) * 100) || 0;
                document.getElementById(`${s}-perc`).innerText = p + '%';
                const barId = s === 'chemistry' ? 'chem-bar' : s + '-bar';
                document.getElementById(barId).style.width = p + '%';
            });
        }

        // --- HISTORY LOGIC ---
        function addMockResult() {
            const m = parseInt(document.getElementById('m-score').value) || 0;
            const p = parseInt(document.getElementById('p-score').value) || 0;
            const c = parseInt(document.getElementById('c-score').value) || 0;
            const total = m + p + c;
            const date = new Date().toLocaleDateString();
            
            mockResults.push({ m, p, c, total, date });
            localStorage.setItem('mockHistory', JSON.stringify(mockResults));
            renderHistory();
        }

        let myChart;
        function renderHistory() {
            const body = document.getElementById('mock-history-body');
            body.innerHTML = '';
            const labels = [], data = [];

            mockResults.forEach((res, i) => {
                body.insertAdjacentHTML('afterbegin', `<tr><td>${i+1}</td><td>${res.m}</td><td>${res.p}</td><td>${res.c}</td><td class="text-white">${res.total}</td><td>${res.date}</td></tr>`);
                labels.push(`M${i+1}`);
                data.push(res.total);
            });

            if (myChart) myChart.destroy();
            const ctx = document.getElementById('scoreChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Total Score',
                        data: data,
                        borderColor: '#fff',
                        borderWidth: 1,
                        pointRadius: 2,
                        tension: 0.3,
                        fill: false
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        x: { display: true, grid: { display: false }, ticks: { color: '#444' } },
                        y: { display: true, grid: { color: '#111' }, ticks: { color: '#444' } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        renderTable();
    </script>
</body>
</html>

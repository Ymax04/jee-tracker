<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEE Prep Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000000; 
            color: #ffffff; 
        }
        .planner-card {
            background-color: #111111;
            border: 1px solid #222222;
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        .progress-line {
            height: 2px;
            background-color: #222222;
        }
        .progress-fill {
            height: 100%;
            background-color: #ffffff;
            transition: width 1s ease-in-out;
        }
        .subject-tab {
            color: #666666;
            font-size: 0.875rem;
            font-weight: 600;
            padding-bottom: 8px;
            border-bottom: 2px solid transparent;
        }
        .tab-active {
            color: #ffffff;
            border-bottom: 2px solid #ffffff;
        }
        .category-header {
            color: #666666;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding-top: 2rem;
            padding-bottom: 1rem;
        }
        .custom-check {
            width: 1.25rem;
            height: 1.25rem;
            background-color: #000000;
            border: 1px solid #333333;
            border-radius: 4px;
            cursor: pointer;
            accent-color: #ffffff;
        }
        #sigma-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
    </style>
</head>
<body class="p-4 md:p-12">

    <div id="sigma-modal" onclick="this.style.display='none'">
        <div class="text-8xl mb-6">🗿</div>
        <h2 class="text-5xl font-black italic tracking-tighter uppercase mb-2">Chapter Decimated</h2>
        <p class="text-zinc-500 font-bold tracking-widest uppercase text-sm">One Step Closer to the Dream</p>
    </div>

    <header class="max-w-6xl mx-auto mb-12">
        <div class="flex justify-between items-end mb-8">
            <h1 class="text-xl font-bold tracking-tighter">JEE PLANNER</h1>
            <div class="flex gap-4 text-xs font-bold text-zinc-500 uppercase">
                <span>Focus</span>
                <span>History</span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="space-y-2">
                <div class="flex justify-between text-[10px] font-bold uppercase text-zinc-500">
                    <span>Math</span>
                    <span id="math-perc">0% (0/31)</span>
                </div>
                <div class="progress-line w-full"><div id="math-bar" class="progress-fill" style="width: 0%"></div></div>
            </div>
            <div class="space-y-2">
                <div class="flex justify-between text-[10px] font-bold uppercase text-zinc-500">
                    <span>Physics</span>
                    <span id="physics-perc">0% (0/34)</span>
                </div>
                <div class="progress-line w-full"><div id="physics-bar" class="progress-fill" style="width: 0%"></div></div>
            </div>
            <div class="space-y-2">
                <div class="flex justify-between text-[10px] font-bold uppercase text-zinc-500">
                    <span>Chemistry</span>
                    <span id="chemistry-perc">0% (0/34)</span>
                </div>
                <div class="progress-line w-full"><div id="chemistry-bar" class="progress-fill" style="width: 0%"></div></div>
            </div>
        </div>
    </header>

    <nav class="max-w-6xl mx-auto flex gap-8 mb-12 border-b border-zinc-900">
        <button onclick="changeSubject('math')" id="tab-math" class="subject-tab tab-active">MATHEMATICS</button>
        <button onclick="changeSubject('physics')" id="tab-physics" class="subject-tab">PHYSICS</button>
        <button onclick="changeSubject('chemistry')" id="tab-chemistry" class="subject-tab">CHEMISTRY</button>
    </nav>

    <main class="max-w-6xl mx-auto">
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead class="text-[10px] font-bold text-zinc-600 uppercase">
                    <tr>
                        <th class="pb-4 pr-4">#</th>
                        <th class="pb-4 w-1/3">Topic</th>
                        <th class="pb-4 text-center">Stat</th>
                        <th class="pb-4 text-center">PYQ (B)</th>
                        <th class="pb-4 text-center">PYQ (M)</th>
                        <th class="pb-4 text-center">Test</th>
                        <th class="pb-4 text-center">Rev 1</th>
                        <th class="pb-4 text-center">Rev 2</th>
                        <th class="pb-4 text-center">Form</th>
                    </tr>
                </thead>
                <tbody id="planner-body">
                    </tbody>
            </table>
        </div>
    </main>

    <script>
        [cite_start]// Full Data from Trackers [cite: 1, 5, 9]
        const appData = {
            math: {
                "Category 1": ["Matrices And Determinants", "Sequence And Series", "Straight Line", "Probability", "Complex Numbers", "Functions", "Indefinite Integration", "Mathematical Reasoning", "Statistics"],
                "Category 2": ["Vector 3D", "Binomial Theorem", "Application Of Derivatives", "Circle", "Definite Integration", "Differential Equation", "Parabola", "Area Under Curves", "Quadratic Equations", "Vector", "Limits"],
                "Category 3": ["Continutity And Differentiability", "Hyperbola", "Trigonometrical Ratios", "Heights And Distances", "Trigonometrical Equations", "Set Theory And Relations"],
                "Category 4": ["Permutation And Combination", "Ellipse", "Differentiation", "Inverse Trigonometric Functions", "Solution Of Triangle"]
            },
            physics: {
                "Category 1": ["Current Electricity", "Semiconductors", "Thermal Properties Of Matter", "Calorimetry", "Kinetic Theory Of Gases", "Properties Of Matter", "Fluid Mechanics", "Capacitance", "Gravitation", "Units And Dimensions", "Alternating Current", "Communication System"],
                "Category 2": ["Photoelectric Effect", "Electrostatics", "Rotational Motion", "Electromagnetic Waves", "Ray Optics", "Waves And Sound", "Oscillations", "Magnetic Effects Of Current", "Electromagnetic Induction", "Center Of Mass And Momentum"],
                "Category 3": ["Wave Optics", "Atomic Physics", "Work Power Energy", "Nuclear Physics", "Motion in Two Dimension", "Laws Of Motion"],
                "Category 4": ["Experimental Physics", "Motion In One Dimension", "Magnetism", "Heat Transfer", "Circular Motion", "Mathematics In Physics"]
            },
            chemistry: {
                "Category 1": ["Biomolecules", "Polymers", "P Block Elements", "Environmental Chemistry", "S Block & Hydrogen", "Mole Concept", "Surface Chemistry", "Atomic Structure", "Electrochemistry", "Metallurgy", "Solutions"],
                "Category 2": ["Coordination Compounds", "Chemical Thermodynamics", "General Organic Chemistry", "Hydrocarbons", "Haloalkanes", "Aldehydes And Ketones", "Amines", "Chemical Kinetics", "Chemical Bonding", "d and f block elements", "Haloarenes And Phenols"],
                "Category 3": ["Periodicity", "Solid State", "Gaseous State", "Purification Of Organic Compounds", "Chemistry in Everyday Life", "Chemical Equilibrium"],
                "Category 4": ["Alcohols Phenols And Ethers", "Carboxylic Acid And Its Derivatives", "lonic Equilibrium", "Aromatic Compounds", "Redox Reactions", "Qualitative Inorganic Chemistry"]
            }
        };

        let currentSub = 'math';
        const columns = ['status', 'pyq_beg', 'pyq_mod', 'test', 'rev1', 'rev2', 'form'];

        function changeSubject(sub) {
            currentSub = sub;
            document.querySelectorAll('.subject-tab').forEach(t => t.classList.remove('tab-active'));
            document.getElementById(`tab-${sub}`).classList.add('tab-active');
            renderPlanner();
        }

        function renderPlanner() {
            const body = document.getElementById('planner-body');
            body.innerHTML = '';
            let count = 1;

            for (const [cat, topics] of Object.entries(appData[currentSub])) {
                body.insertAdjacentHTML('beforeend', `<tr><td colspan="9" class="category-header">${cat}</td></tr>`);
                
                topics.forEach(topic => {
                    const rowId = `${currentSub}-${count}`;
                    let rowHtml = `<tr class="border-b border-zinc-900 group">
                        <td class="py-6 pr-4 text-[10px] text-zinc-700 font-bold">${count}</td>
                        <td class="py-6 font-bold text-sm text-zinc-200">${topic}</td>`;
                    
                    columns.forEach(col => {
                        const key = `${rowId}-${col}`;
                        const isChecked = localStorage.getItem(key) === 'true';
                        rowHtml += `<td class="py-6 text-center">
                            <input type="checkbox" ${isChecked ? 'checked' : ''} 
                                class="custom-check" 
                                onchange="updateProgress('${rowId}', '${col}', this)">
                        </td>`;
                    });
                    
                    rowHtml += `</tr>`;
                    body.insertAdjacentHTML('beforeend', rowHtml);
                    count++;
                });
            }
            updateUI();
        }

        function updateProgress(rowId, col, el) {
            localStorage.setItem(`${rowId}-${col}`, el.checked);
            
            if (el.checked) {
                const rowAllChecked = columns.every(c => localStorage.getItem(`${rowId}-${c}`) === 'true');
                if (rowAllChecked) {
                    document.getElementById('sigma-modal').style.display = 'flex';
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                }
            }
            updateUI();
        }

        function updateUI() {
            ['math', 'physics', 'chemistry'].forEach(sub => {
                let totalItems = 0;
                let doneItems = 0;
                let totalTopics = 0;

                Object.values(appData[sub]).forEach(list => {
                    totalTopics += list.length;
                    totalItems += list.length * columns.length;
                });

                for (let i = 1; i <= totalTopics; i++) {
                    columns.forEach(col => {
                        if (localStorage.getItem(`${sub}-${i}-${col}`) === 'true') doneItems++;
                    });
                }

                const perc = Math.round((doneItems / totalItems) * 100) || 0;
                const completedTopics = 0; // Logic for fully completed chapters could go here
                
                document.getElementById(`${sub}-perc`).innerText = `${perc}% (${Math.floor(doneItems/columns.length)}/${totalTopics})`;
                document.getElementById(`${sub}-bar`).style.width = `${perc}%`;
            });
        }

        renderPlanner();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>JEE 2026 Planner | Best IIT-JEE Syllabus Tracker & Mock Analysis</title>
    <meta name="description" content="Free minimalist JEE 2026 syllabus tracker and mock test analyzer. Track progress in Math, Physics, and Chemistry and visualize your scores.">
    <meta name="keywords" content="JEE 2026, JEE tracker, IIT JEE syllabus, mock test analyzer, JEE planner">
    <meta name="google-site-verification" content="googleb8d38b7a2f5cbe1c.html" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000000; 
            color: #ffffff; 
            margin: 0; 
            overflow-y: auto; 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* PREMIUM LOADER */
        #loader {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .loader-text { 
            color: #ffffff; font-size: 10px; text-transform: uppercase; 
            letter-spacing: 5px; font-weight: 300; opacity: 0.6;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.7; } }

        /* HEADER & PROGRESS */
        .progress-sub { color: #555; font-size: 11px; margin-bottom: 5px; }
        .progress-bar-bg { background: #111; height: 1px; width: 100%; }
        .progress-bar-fill { background: #ffffff; height: 1px; transition: width 0.8s ease; }

        /* TABLE & STICKY NAV */
        .table-wrapper { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { border-collapse: separate; border-spacing: 0; width: 100%; }

        thead th {
            background-color: #000; color: #444; font-weight: 500; 
            font-size: 9px; text-transform: uppercase; padding: 15px 10px; 
            border-bottom: 1px solid #111; text-align: center;
        }

        .topic-col { text-align: left !important; min-width: 220px; }
        tbody td { padding: 15px 10px; border-bottom: 1px solid #0a0a0a; font-size: 13px; color: #888; text-align: center; }

        .category-row td {
            background-color: #000; color: #222; font-size: 10px;
            text-transform: uppercase; letter-spacing: 1px; padding: 35px 10px 10px;
            text-align: left; border: none;
        }

        /* CHECKBOX */
        .cb {
            appearance: none; width: 16px; height: 16px; border: 1px solid #222;
            border-radius: 2px; cursor: pointer; transition: 0.2s; position: relative;
        }
        .cb:checked { background: #ffffff; border-color: #ffffff; }
        .cb:checked::after {
            content: ''; position: absolute; left: 5px; top: 2px;
            width: 4px; height: 8px; border: solid #000;
            border-width: 0 2px 2px 0; transform: rotate(45deg);
        }

        /* HISTORY COMPONENTS */
        .mock-input {
            background: transparent; border-bottom: 1px solid #111; color: #fff;
            padding: 12px; font-size: 13px; width: 100%; text-align: center;
            outline: none; transition: 0.3s;
        }
        .mock-input:focus { border-color: #444; }
        .history-card { border: 1px solid #0a0a0a; padding: 20px; margin-top: 20px; background: #000; }
        
        #record-btn, .timer-btn {
            background: transparent; color: #666; border: 1px solid #111;
            transition: all 0.3s ease; font-weight: 400; cursor: pointer;
        }
        #record-btn:hover, .timer-btn:hover { border-color: #444; color: #fff; background: #050505; }

        .del-btn { color: #333; font-size: 10px; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .del-btn:hover { color: #ff4d4d; }

        .tab-btn { color: #444; font-size: 11px; font-weight: 500; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .tab-btn.active { color: #fff !important; border-bottom: 1px solid #fff !important; }

        /* TIMER BOX */
        .timer-box { border: 1px solid #111; padding: 15px; background: #050505; text-align: center; }
    </style>
</head>
<body class="pb-20">

    <div id="loader"><div class="loader-text">LOADING</div></div>

    <header class="p-8 max-w-5xl mx-auto mt-6">
        <div class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-[10px] font-medium tracking-[0.4em] text-gray-500 uppercase">JEE 2026</h1>
                <p id="rank-display" class="text-[8px] text-gray-700 tracking-widest uppercase mt-1">Global Rank: #--</p>
            </div>
            <div class="flex gap-8">
                <span id="nav-focus" onclick="showSection('tracker')" class="text-[9px] text-white uppercase tracking-widest cursor-pointer">Focus</span>
                <span id="nav-history" onclick="showSection('history')" class="text-[9px] text-gray-700 uppercase tracking-widest cursor-pointer hover:text-white transition">History</span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-12">
            <div class="timer-box col-span-1 md:col-span-2 flex flex-col justify-center">
                <div class="flex justify-between items-center px-4">
                    <div class="text-left">
                        <p class="text-[8px] text-gray-500 uppercase tracking-widest mb-1">Session Timer</p>
                        <h2 id="timer-display" class="text-2xl font-light tracking-tighter">00:00:00</h2>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="toggleTimer()" id="timer-control" class="timer-btn text-[9px] px-4 py-2 uppercase tracking-widest">Start</button>
                        <button onclick="resetTimer()" class="timer-btn text-[9px] px-4 py-2 uppercase tracking-widest">Reset</button>
                    </div>
                </div>
            </div>
            <div class="timer-box flex flex-col justify-center">
                <p class="text-[8px] text-gray-500 uppercase tracking-widest mb-1">Today's Total</p>
                <h2 id="today-total" class="text-xl font-light tracking-tighter">0h 0m</h2>
            </div>
            <div class="timer-box flex flex-col justify-center">
                <p class="text-[8px] text-gray-500 uppercase tracking-widest mb-1">Focus Score</p>
                <h2 class="text-xl font-light tracking-tighter text-gray-600">--</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-12">
            <div>
                <div class="flex justify-between progress-sub"><span>Math</span><span id="math-perc">0%</span></div>
                <div class="progress-bar-bg"><div id="math-bar" class="progress-bar-fill" style="width: 0%"></div></div>
            </div>
            <div>
                <div class="flex justify-between progress-sub"><span>Physics</span><span id="physics-perc">0%</span></div>
                <div class="progress-bar-bg"><div id="physics-bar" class="progress-bar-fill" style="width: 0%"></div></div>
            </div>
            <div>
                <div class="flex justify-between progress-sub"><span>Chemistry</span><span id="chemistry-perc">0%</span></div>
                <div class="progress-bar-bg"><div id="chem-bar" class="progress-bar-fill" style="width: 0%"></div></div>
            </div>
        </div>
    </header>

    <div id="section-tracker">
        <nav class="flex justify-center gap-12 max-w-5xl mx-auto px-4 border-b border-[#111]">
            <button onclick="switchTab('math')" id="tab-math" class="tab-btn active py-4">Mathematics</button>
            <button onclick="switchTab('physics')" id="tab-physics" class="tab-btn py-4">Physics</button>
            <button onclick="switchTab('chemistry')" id="tab-chemistry" class="tab-btn py-4">Chemistry</button>
        </nav>
        <main class="max-w-5xl mx-auto px-4 mt-4">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr><th class="w-10">#</th><th class="topic-col">Topic</th><th>Status</th><th>PYQ(B)</th><th>PYQ(M)</th><th>Test</th><th>R1</th><th>R2</th><th>Form</th></tr>
                    </thead>
                    <tbody id="tracker-body"></tbody>
                </table>
            </div>
        </main>
    </div>

    <div id="section-history" class="hidden max-w-5xl mx-auto px-8">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-8 mb-12 items-end">
            <div><input type="number" id="m-score" placeholder="MATH" class="mock-input"></div>
            <div><input type="number" id="p-score" placeholder="PHYSICS" class="mock-input"></div>
            <div><input type="number" id="c-score" placeholder="CHEMISTRY" class="mock-input"></div>
            <button onclick="addMockResult()" id="record-btn" class="text-[10px] py-3 uppercase tracking-[0.2em]">Record Score</button>
        </div>

        <div class="history-card">
            <canvas id="scoreChart" height="180"></canvas>
        </div>

        <div class="mt-16 table-wrapper">
            <table>
                <thead>
                    <tr><th>Mock</th><th>M</th><th>P</th><th>C</th><th>Total</th><th>Date</th><th>Action</th></tr>
                </thead>
                <tbody id="mock-history-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const fullData = {
            math: { "Category 1": ["Matrices And Determinants", "Sequence And Series", "Straight Line", "Probability", "Complex Numbers", "Functions", "Indefinite Integration", "Mathematical Reasoning", "Statistics"], "Category 2": ["Vector 3D", "Binomial Theorem", "Application Of Derivatives", "Circle", "Definite Integration", "Differential Equation", "Parabola", "Area Under Curves", "Quadratic Equations", "Vector", "Limits"], "Category 3": ["Continutity And Differentiability", "Hyperbola", "Trigonometrical Ratios", "Heights And Distances", "Trigonometrical Equations", "Set Theory And Relations"], "Category 4": ["Permutation And Combination", "Ellipse", "Differentiation", "Inverse Trigonometric Functions", "Solution Of Triangle"] },
            physics: { "Category 1": ["Current Electricity", "Semiconductors", "Thermal Properties Of Matter", "Calorimetry", "Kinetic Theory Of Gases", "Properties Of Matter", "Fluid Mechanics", "Capacitance", "Gravitation", "Units And Dimensions", "Alternating Current", "Communication System"], "Category 2": ["Photoelectric Effect", "Electrostatics", "Rotational Motion", "Electromagnetic Waves", "Ray Optics", "Waves And Sound", "Oscillations", "Magnetic Effects Of Current", "Electromagnetic Induction", "Center Of Mass And Momentum"], "Category 3": ["Wave Optics", "Atomic Physics", "Work Power Energy", "Nuclear Physics", "Motion in Two Dimension", "Laws Of Motion"], "Category 4": ["Experimental Physics", "Motion In One Dimension", "Magnetism", "Heat Transfer", "Circular Motion", "Mathematics In Physics"] },
            chemistry: { "Category 1": ["Biomolecules", "Polymers", "P Block Elements", "Environmental Chemistry", "S Block & Hydrogen", "Mole Concept", "Surface Chemistry", "Atomic Structure", "Electrochemistry", "Metallurgy", "Solutions"], "Category 2": ["Coordination Compounds", "Chemical Thermodynamics", "General Organic Chemistry", "Hydrocarbons", "Haloalkanes", "Aldehydes And Ketones", "Amines", "Chemical Kinetics", "Chemical Bonding", "d and f block elements", "Haloarenes And Phenols"], "Category 3": ["Periodicity", "Solid State", "Gaseous State", "Purification Of Organic Compounds", "Chemistry in Everyday Life", "Chemical Equilibrium"], "Category 4": ["Alcohols Phenols And Ethers", "Carboxylic Acid And Its Derivatives", "Ionic Equilibrium", "Aromatic Compounds", "Redox Reactions", "Qualitative Inorganic Chemistry"] }
        };

        const cols = ['st', 'pb', 'pm', 'ts', 'r1', 'r2', 'fr'];
        let currentSub = 'math';
        let mockResults = JSON.parse(localStorage.getItem('mockHistory') || '[]');

        function hideLoader() { 
            const l = document.getElementById('loader');
            l.style.opacity = '0'; 
            setTimeout(() => { l.style.display = 'none'; }, 800); 
        }
        window.addEventListener('load', () => setTimeout(hideLoader, 600));

        function showSection(sec) {
            document.getElementById('section-tracker').classList.toggle('hidden', sec !== 'tracker');
            document.getElementById('section-history').classList.toggle('hidden', sec !== 'history');
            document.getElementById('nav-focus').className = (sec === 'tracker') ? 'text-[9px] text-white uppercase tracking-widest cursor-pointer' : 'text-[9px] text-gray-700 uppercase tracking-widest cursor-pointer';
            document.getElementById('nav-history').className = (sec === 'history') ? 'text-[9px] text-white uppercase tracking-widest cursor-pointer' : 'text-[9px] text-gray-700 uppercase tracking-widest cursor-pointer';
            if(sec === 'history') renderHistory();
        }

        function switchTab(sub) {
            currentSub = sub;
            ['math', 'physics', 'chemistry'].forEach(s => document.getElementById(`tab-${s}`).classList.toggle('active', s === sub));
            renderTable();
        }

        function renderTable() {
            const body = document.getElementById('tracker-body');
            body.innerHTML = '';
            let count = 1;
            for (const [cat, topics] of Object.entries(fullData[currentSub])) {
                body.insertAdjacentHTML('beforeend', `<tr class="category-row"><td colspan="9">${cat}</td></tr>`);
                topics.forEach(topic => {
                    const rowId = `${currentSub}-${count}`;
                    let rowHtml = `<tr><td style="color:#222">${count}</td><td class="topic-col" style="color:#bbb">${topic}</td>`;
                    cols.forEach(col => {
                        const checkId = `${rowId}-${col}`;
                        rowHtml += `<td><input type="checkbox" ${localStorage.getItem(checkId) === 'true' ? 'checked' : ''} class="cb" onchange="save('${checkId}', this.checked)"></td>`;
                    });
                    body.insertAdjacentHTML('beforeend', rowHtml + `</tr>`);
                    count++;
                });
            }
            updateStats();
        }

        function save(id, val) { localStorage.setItem(id, val); updateStats(); }

        function updateStats() {
            ['math', 'physics', 'chemistry'].forEach(s => {
                let done = 0, total = 0;
                Object.values(fullData[s]).forEach(l => total += l.length * cols.length);
                for (let i = 0; i < localStorage.length; i++) {
                    const k = localStorage.key(i);
                    if (k && k.startsWith(s + '-') && localStorage.getItem(k) === 'true') done++;
                }
                const p = Math.min(Math.round((done / total) * 100), 100) || 0;
                document.getElementById(`${s}-perc`).innerText = p + '%';
                const barId = s === 'chemistry' ? 'chem-bar' : s + '-bar';
                if (document.getElementById(barId)) document.getElementById(barId).style.width = p + '%';
            });
        }

        // TIMER LOGIC
        let timerSeconds = 0;
        let timerInterval = null;
        let todaySeconds = parseInt(localStorage.getItem('todayStudyTime') || '0');
        let lastDate = localStorage.getItem('lastStudyDate') || new Date().toLocaleDateString();

        function checkDateReset() {
            const now = new Date().toLocaleDateString();
            if (lastDate !== now) {
                todaySeconds = 0;
                lastDate = now;
                localStorage.setItem('todayStudyTime', '0');
                localStorage.setItem('lastStudyDate', now);
            }
            updateTotalDisplay();
        }

        function toggleTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
                document.getElementById('timer-control').innerText = 'Start';
            } else {
                timerInterval = setInterval(() => {
                    timerSeconds++;
                    todaySeconds++;
                    localStorage.setItem('todayStudyTime', todaySeconds);
                    updateTimerDisplay();
                    updateTotalDisplay();
                }, 1000);
                document.getElementById('timer-control').innerText = 'Pause';
            }
        }

        function resetTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
            timerSeconds = 0;
            updateTimerDisplay();
            document.getElementById('timer-control').innerText = 'Start';
        }

        function updateTimerDisplay() {
            const h = Math.floor(timerSeconds / 3600);
            const m = Math.floor((timerSeconds % 3600) / 60);
            const s = timerSeconds % 60;
            document.getElementById('timer-display').innerText = 
                `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function updateTotalDisplay() {
            const h = Math.floor(todaySeconds / 3600);
            const m = Math.floor((todaySeconds % 3600) / 60);
            document.getElementById('today-total').innerText = `${h}h ${m}m`;
        }

        function addMockResult() {
            const m = parseInt(document.getElementById('m-score').value) || 0;
            const p = parseInt(document.getElementById('p-score').value) || 0;
            const c = parseInt(document.getElementById('c-score').value) || 0;
            const total = m + p + c;
            const date = new Date().toLocaleDateString('en-GB');
            mockResults.push({ m, p, c, total, date });
            localStorage.setItem('mockHistory', JSON.stringify(mockResults));
            ['m-score', 'p-score', 'c-score'].forEach(id => document.getElementById(id).value = '');
            renderHistory();
        }

        function deleteMock(idx) {
            mockResults.splice(idx, 1);
            localStorage.setItem('mockHistory', JSON.stringify(mockResults));
            renderHistory();
        }

        let myChart;
        function renderHistory() {
            const body = document.getElementById('mock-history-body');
            body.innerHTML = '';
            const labels = [], chartData = [];
            const currentData = JSON.parse(localStorage.getItem('mockHistory') || '[]');
            currentData.forEach((res, i) => {
                const row = `<tr><td>${i + 1}</td><td>${res.m}</td><td>${res.p}</td><td>${res.c}</td><td style="color:#fff; font-weight:600;">${res.total}</td><td>${res.date}</td><td><span class="del-btn" onclick="deleteMock(${i})">Delete</span></td></tr>`;
                body.insertAdjacentHTML('afterbegin', row);
                labels.push(`#${i+1}`);
                chartData.push(res.total);
            });
            if (myChart) myChart.destroy();
            const ctx = document.getElementById('scoreChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: chartData,
                        borderColor: '#ffffff',
                        borderWidth: 1.5,
                        pointBackgroundColor: '#fff',
                        pointRadius: 3,
                        tension: 0.2
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        x: { grid: { display: false }, ticks: { color: '#333', font: { size: 9 } } },
                        y: { grid: { color: '#0a0a0a' }, ticks: { color: '#333', font: { size: 9 } } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        checkDateReset();
        renderTable();
    </script>
</body>
</html>

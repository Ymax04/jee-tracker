<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JEE 2026 Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000000; 
            color: #ffffff; 
            margin: 0; 
            overflow: hidden;
        }

        /* SIMPLE LOADER */
        #loader {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; justify-content: center; align-items: center;
        }
        .loader-text {
            color: #666; font-size: 10px; text-transform: uppercase; letter-spacing: 2px;
        }

        /* MINIMALIST DASHBOARD */
        .progress-sub { color: #999; font-size: 11px; margin-bottom: 4px; }
        .progress-bar-bg { background: #1a1a1a; height: 2px; border-radius: 1px; width: 100%; }
        .progress-bar-fill { background: #ffffff; height: 2px; transition: width 0.5s ease; }

        /* CLEAN TABLE LOGIC */
        .table-container {
            overflow: auto; height: 70vh; margin-top: 20px;
            scrollbar-width: thin; scrollbar-color: #333 #000;
        }

        table { border-collapse: separate; border-spacing: 0; width: 100%; }

        thead th {
            position: sticky; top: 0; z-index: 100;
            background-color: #000 !important; /* Fixed sticky overlap */
            color: #666; font-weight: 500; font-size: 10px; text-transform: uppercase;
            padding: 15px 10px; border-bottom: 1px solid #1a1a1a; text-align: center;
        }

        .topic-col { text-align: left !important; width: 30%; }

        tbody td {
            padding: 12px 10px; border-bottom: 1px solid #1a1a1a;
            font-size: 13px; color: #ccc; text-align: center;
        }

        .category-row td {
            background-color: #000; color: #666; font-size: 10px;
            text-transform: uppercase; letter-spacing: 1px; padding: 20px 10px 10px;
            text-align: left; border: none;
        }

        /* CUSTOM CHECKBOX */
        .cb {
            appearance: none; width: 16px; height: 16px; border: 1px solid #333;
            border-radius: 2px; cursor: pointer; transition: 0.2s; position: relative;
        }
        .cb:checked { background: #ffffff; border-color: #ffffff; }
        .cb:checked::after {
            content: ''; position: absolute; left: 5px; top: 2px;
            width: 4px; height: 8px; border: solid #000;
            border-width: 0 2px 2px 0; transform: rotate(45deg);
        }

        .tab-btn { color: #666; font-size: 12px; font-weight: 500; padding: 10px 20px; transition: 0.3s; }
        .tab-btn.active { color: #fff; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-text">LOADING</div>
    </div>

    <header class="p-8 max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-sm font-semibold tracking-widest uppercase">JEE 2026</h1>
            <div class="flex gap-4">
                <span class="text-[10px] text-gray-500 uppercase tracking-widest">Focus</span>
                <span class="text-[10px] text-gray-500 uppercase tracking-widest">History</span>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-8">
            <div>
                <div class="flex justify-between progress-sub">
                    <span>Math</span>
                    <span id="math-perc">0%</span>
                </div>
                <div class="progress-bar-bg"><div id="math-bar" class="progress-bar-fill" style="width: 0%"></div></div>
            </div>
            <div>
                <div class="flex justify-between progress-sub">
                    <span>Physics</span>
                    <span id="physics-perc">0%</span>
                </div>
                <div class="progress-bar-bg"><div id="physics-bar" class="progress-bar-fill" style="width: 0%"></div></div>
            </div>
            <div>
                <div class="flex justify-between progress-sub">
                    <span>Chemistry</span>
                    <span id="chemistry-perc">0%</span>
                </div>
                <div class="progress-bar-bg"><div id="chem-bar" class="progress-bar-fill" style="width: 0%"></div></div>
            </div>
        </div>
    </header>

    <nav class="flex justify-center gap-8 border-b border-[#1a1a1a] max-w-5xl mx-auto">
        <button onclick="switchTab('math')" id="tab-math" class="tab-btn active">Mathematics</button>
        <button onclick="switchTab('physics')" id="tab-physics" class="tab-btn">Physics</button>
        <button onclick="switchTab('chemistry')" id="tab-chemistry" class="tab-btn">Chemistry</button>
    </nav>

    <main class="max-w-5xl mx-auto px-4">
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th class="w-12">#</th>
                        <th class="topic-col">Topic</th>
                        <th>Status</th>
                        <th>PYQ(B)</th>
                        <th>PYQ(M)</th>
                        <th>Test</th>
                        <th>Rev 1</th>
                        <th>Rev 2</th>
                        <th>Formula</th>
                    </tr>
                </thead>
                <tbody id="tracker-body"></tbody>
            </table>
        </div>
    </main>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 1000);
        });

        const fullData = {
            math: { 
                "Category 1": ["Matrices And Determinants", "Sequence And Series", "Straight Line", "Probability", "Complex Numbers", "Functions", "Indefinite Integration", "Mathematical Reasoning", "Statistics"], 
                "Category 2": ["Vector 3D", "Binomial Theorem", "Application Of Derivatives", "Circle", "Definite Integration", "Differential Equation", "Parabola", "Area Under Curves", "Quadratic Equations", "Vector", "Limits"], 
                "Category 3": ["Continutity And Differentiability", "Hyperbola", "Trigonometrical Ratios", "Heights And Distances", "Trigonometrical Equations", "Set Theory And Relations"], 
                "Category 4": ["Permutation And Combination", "Ellipse", "Differentiation", "Inverse Trigonometric Functions", "Solution Of Triangle"]
            },
            physics: { 
                "Category 1": ["Current Electricity", "Semiconductors", "Thermal Properties Of Matter", "Calorimetry", "Kinetic Theory Of Gases", "Properties Of Matter", "Fluid Mechanics", "Capacitance", "Gravitation", "Units And Dimensions", "Alternating Current", "Communication System"], 
                "Category 2": ["Photoelectric Effect", "Electrostatics", "Rotational Motion", "Electromagnetic Waves", "Ray Optics", "Waves And Sound", "Oscillations", "Magnetic Effects Of Current", "Electromagnetic Induction", "Center Of Mass And Momentum"], 
                "Category 3": ["Wave Optics", "Atomic Physics", "Work Power Energy", "Nuclear Physics", "Motion in Two Dimension", "Laws Of Motion"], 
                "Category 4": ["Experimental Physics", "Motion In One Dimension", "Magnetism", "Heat Transfer", "Circular Motion", "Mathematics In Physics"]
            },
            chemistry: { 
                "Category 1": ["Biomolecules", "Polymers", "P Block Elements", "Environmental Chemistry", "S Block & Hydrogen", "Mole Concept", "Surface Chemistry", "Atomic Structure", "Electrochemistry", "Metallurgy", "Solutions"], 
                "Category 2": ["Coordination Compounds", "Chemical Thermodynamics", "General Organic Chemistry", "Hydrocarbons", "Haloalkanes", "Aldehydes And Ketones", "Amines", "Chemical Kinetics", "Chemical Bonding", "d and f block elements", "Haloarenes And Phenols"], 
                "Category 3": ["Periodicity", "Solid State", "Gaseous State", "Purification Of Organic Compounds", "Chemistry in Everyday Life", "Chemical Equilibrium"], 
                "Category 4": ["Alcohols Phenols And Ethers", "Carboxylic Acid And Its Derivatives", "lonic Equilibrium", "Aromatic Compounds", "Redox Reactions", "Qualitative Inorganic Chemistry"]
            }
        };

        let currentSub = 'math';
        const cols = ['st', 'pb', 'pm', 'ts', 'r1', 'r2', 'fr'];

        function switchTab(sub) {
            currentSub = sub;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${sub}`).classList.add('active');
            renderTable();
        }

        function renderTable() {
            const body = document.getElementById('tracker-body');
            body.innerHTML = '';
            let count = 1;
            for (const [cat, topics] of Object.entries(fullData[currentSub])) {
                body.insertAdjacentHTML('beforeend', `<tr class="category-row"><td colspan="9">${cat}</td></tr>`);
                topics.forEach(topic => {
                    const rowId = `${currentSub}-${count}`;
                    let rowHtml = `<tr>
                        <td style="color:#444">${count}</td>
                        <td class="topic-col" style="color:#eee">${topic}</td>`;
                    cols.forEach(col => {
                        const checkId = `${rowId}-${col}`;
                        rowHtml += `<td><input type="checkbox" ${localStorage.getItem(checkId) === 'true' ? 'checked' : ''} class="cb" onchange="save('${checkId}', this.checked)"></td>`;
                    });
                    body.insertAdjacentHTML('beforeend', rowHtml + `</tr>`);
                    count++;
                });
            }
            updateStats();
        }

        function save(id, val) {
            localStorage.setItem(id, val);
            updateStats();
        }

        function updateStats() {
            ['math', 'physics', 'chemistry'].forEach(s => {
                let done = 0, total = 0;
                Object.values(fullData[s]).forEach(l => total += l.length * cols.length);
                for (let i = 0; i < localStorage.length; i++) {
                    if (localStorage.key(i).startsWith(s + '-') && localStorage.getItem(localStorage.key(i)) === 'true') done++;
                }
                const p = Math.round((done / total) * 100) || 0;
                document.getElementById(`${s}-perc`).innerText = p + '%';
                document.getElementById(`${s === 'chemistry' ? 'chem' : s}-bar`).style.width = p + '%';
            });
        }

        renderTable();
    </script>
</body>
</html>

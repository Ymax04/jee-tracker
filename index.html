<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JEE Prep Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000000; 
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Fixed the 'unclickable' issue by ensuring content is above background elements */
        main { position: relative; z-index: 10; }

        .progress-line {
            height: 2px;
            background-color: #1a1a1a;
            width: 100%;
        }
        .progress-fill {
            height: 100%;
            background-color: #ffffff;
            transition: width 0.8s ease;
        }

        .subject-tab {
            color: #52525b;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 0.1em;
            padding: 12px 0;
            border-bottom: 2px solid transparent;
            white-space: nowrap;
        }
        .tab-active {
            color: #ffffff;
            border-bottom: 2px solid #ffffff;
        }

        /* Mobile specific adjustments */
        .table-container {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .custom-check {
            width: 1.4rem;
            height: 1.4rem;
            background-color: #000000;
            border: 1px solid #3f3f46;
            border-radius: 4px;
            cursor: pointer;
            appearance: none;
            display: inline-block;
            position: relative;
        }
        .custom-check:checked {
            background-color: #ffffff;
            border-color: #ffffff;
        }
        .custom-check:checked::after {
            content: '✓';
            color: #000000;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.8rem;
            font-weight: bold;
        }

        #sigma-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
    </style>
</head>
<body class="p-4 md:p-12">

    <div id="sigma-modal" onclick="this.style.display='none'">
        <div class="text-7xl mb-4">🗿</div>
        <h2 class="text-4xl font-black italic tracking-tighter uppercase">CHAPTER FINISHED</h2>
        <p class="text-zinc-500 font-bold tracking-widest uppercase text-[10px] mt-2">Sigma mindset only</p>
    </div>

    <header class="max-w-5xl mx-auto mb-10">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-xs font-black tracking-[0.2em]">JEE PLANNER</h1>
            <div class="flex gap-4 text-[9px] font-bold text-zinc-500 uppercase">
                <span class="text-white">FOCUS</span>
                <span>HISTORY</span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="space-y-2">
                <div class="flex justify-between text-[9px] font-bold uppercase text-zinc-500">
                    <span>Mathematics</span>
                    <span id="math-stat">0/31</span>
                </div>
                <div class="progress-line"><div id="math-bar" class="progress-fill" style="width: 0%"></div></div>
            </div>
            <div class="space-y-2">
                <div class="flex justify-between text-[9px] font-bold uppercase text-zinc-500">
                    <span>Physics</span>
                    <span id="physics-stat">0/34</span>
                </div>
                <div class="progress-line"><div id="physics-bar" class="progress-fill" style="width: 0%"></div></div>
            </div>
            <div class="space-y-2">
                <div class="flex justify-between text-[9px] font-bold uppercase text-zinc-500">
                    <span>Chemistry</span>
                    <span id="chemistry-stat">0/34</span>
                </div>
                <div class="progress-line"><div id="chemistry-bar" class="progress-fill" style="width: 0%"></div></div>
            </div>
        </div>
    </header>

    <nav class="max-w-5xl mx-auto flex gap-6 mb-4 border-b border-zinc-900">
        <button onclick="changeSub('math')" id="nav-math" class="subject-tab tab-active">MATHEMATICS</button>
        <button onclick="changeSub('physics')" id="nav-physics" class="subject-tab">PHYSICS</button>
        <button onclick="changeSub('chemistry')" id="nav-chemistry" class="subject-tab">CHEMISTRY</button>
    </nav>

    <main class="max-w-5xl mx-auto">
        <div class="table-container">
            <table class="w-full text-left min-w-[600px]">
                <thead>
                    <tr class="text-[9px] font-black text-zinc-600 uppercase border-b border-zinc-900">
                        <th class="py-4 w-10">#</th>
                        <th class="py-4">Topic Name</th>
                        <th class="py-4 text-center">Status</th>
                        <th class="py-4 text-center">PYQ (B)</th>
                        <th class="py-4 text-center">PYQ (M)</th>
                        <th class="py-4 text-center">Test</th>
                        <th class="py-4 text-center">R1</th>
                        <th class="py-4 text-center">R2</th>
                        <th class="py-4 text-center">Form</th>
                    </tr>
                </thead>
                <tbody id="planner-content"></tbody>
            </table>
        </div>
    </main>

    <script>
        const data = {
            math: {
                "Category 1": ["Matrices And Determinants", "Sequence And Series", "Straight Line", "Probability", "Complex Numbers", "Functions", "Indefinite Integration", "Mathematical Reasoning", "Statistics"],
                "Category 2": ["Vector 3D", "Binomial Theorem", "Application Of Derivatives", "Circle", "Definite Integration", "Differential Equation", "Parabola", "Area Under Curves", "Quadratic Equations", "Vector", "Limits"],
                "Category 3": ["Continutity And Differentiability", "Hyperbola", "Trigonometrical Ratios", "Heights And Distances", "Trigonometrical Equations", "Set Theory And Relations"],
                "Category 4": ["Permutation And Combination", "Ellipse", "Differentiation", "Inverse Trigonometric Functions", "Solution Of Triangle"]
            },
            physics: {
                "Category 1": ["Current Electricity", "Semiconductors", "Thermal Properties Of Matter", "Calorimetry", "Kinetic Theory Of Gases", "Properties Of Matter", "Fluid Mechanics", "Capacitance", "Gravitation", "Units And Dimensions", "Alternating Current", "Communication System"],
                "Category 2": ["Photoelectric Effect", "Electrostatics", "Rotational Motion", "Electromagnetic Waves", "Ray Optics", "Waves And Sound", "Oscillations", "Magnetic Effects Of Current", "Electromagnetic Induction", "Center Of Mass And Momentum"],
                "Category 3": ["Wave Optics", "Atomic Physics", "Work Power Energy", "Nuclear Physics", "Motion in Two Dimension", "Laws Of Motion"],
                "Category 4": ["Experimental Physics", "Motion In One Dimension", "Magnetism", "Heat Transfer", "Circular Motion", "Mathematics In Physics"]
            },
            chemistry: {
                "Category 1": ["Biomolecules", "Polymers", "P Block Elements", "Environmental Chemistry", "S Block & Hydrogen", "Mole Concept", "Surface Chemistry", "Atomic Structure", "Electrochemistry", "Metallurgy", "Solutions"],
                "Category 2": ["Coordination Compounds", "Chemical Thermodynamics", "General Organic Chemistry", "Hydrocarbons", "Haloalkanes", "Aldehydes And Ketones", "Amines", "Chemical Kinetics", "Chemical Bonding", "d and f block elements", "Haloarenes And Phenols"],
                "Category 3": ["Periodicity", "Solid State", "Gaseous State", "Purification Of Organic Compounds", "Chemistry in Everyday Life", "Chemical Equilibrium"],
                "Category 4": ["Alcohols Phenols And Ethers", "Carboxylic Acid And Its Derivatives", "lonic Equilibrium", "Aromatic Compounds", "Redox Reactions", "Qualitative Inorganic Chemistry"]
            }
        };

        let currentSub = 'math';
        const columns = ['st', 'pb', 'pm', 'ts', 'r1', 'r2', 'fm'];

        function changeSub(sub) {
            currentSub = sub;
            document.querySelectorAll('.subject-tab').forEach(t => t.classList.remove('tab-active'));
            document.getElementById(`nav-${sub}`).classList.add('tab-active');
            render();
        }

        function render() {
            const container = document.getElementById('planner-content');
            container.innerHTML = '';
            let idx = 1;

            for (const [cat, chapters] of Object.entries(data[currentSub])) {
                container.insertAdjacentHTML('beforeend', `<tr><td colspan="9" class="text-[9px] font-black text-zinc-800 uppercase py-6 tracking-widest">${cat}</td></tr>`);
                
                chapters.forEach(name => {
                    const id = `${currentSub}-${idx}`;
                    let row = `<tr class="border-b border-zinc-900/50 group">
                        <td class="py-4 text-[10px] text-zinc-700 font-bold">${idx}</td>
                        <td class="py-4 text-xs font-semibold text-zinc-300">${name}</td>`;
                    
                    columns.forEach(col => {
                        const key = `${id}-${col}`;
                        const checked = localStorage.getItem(key) === 'true' ? 'checked' : '';
                        row += `<td class="py-4 text-center">
                            <input type="checkbox" ${checked} class="custom-check" onchange="toggle('${id}', '${col}', this)">
                        </td>`;
                    });
                    
                    row += `</tr>`;
                    container.insertAdjacentHTML('beforeend', row);
                    idx++;
                });
            }
            updateStats();
        }

        function toggle(id, col, el) {
            localStorage.setItem(`${id}-${col}`, el.checked);
            
            if (el.checked) {
                const rowAll = columns.every(c => localStorage.getItem(`${id}-${c}`) === 'true');
                if (rowAll) {
                    document.getElementById('sigma-modal').style.display = 'flex';
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                }
            }
            updateStats();
        }

        function updateStats() {
            ['math', 'physics', 'chemistry'].forEach(sub => {
                let totalTopics = 0;
                Object.values(data[sub]).forEach(l => totalTopics += l.length);
                
                let doneChapters = 0;
                for(let i=1; i<=totalTopics; i++) {
                    if(columns.every(c => localStorage.getItem(`${sub}-${i}-${c}`) === 'true')) doneChapters++;
                }

                const perc = (doneChapters / totalTopics) * 100;
                document.getElementById(`${sub}-bar`).style.width = `${perc}%`;
                document.getElementById(`${sub}-stat`).innerText = `${doneChapters}/${totalTopics}`;
            });
        }

        render();
    </script>
</body>
</html>

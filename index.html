<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEE Prep Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000000; 
            color: #ffffff; 
        }
        .progress-line {
            height: 2px;
            background-color: #222222;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            background-color: #ffffff;
            transition: width 0.8s ease-in-out;
        }
        .subject-tab {
            color: #666666;
            font-size: 0.875rem;
            font-weight: 600;
            padding-bottom: 8px;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        .tab-active {
            color: #ffffff;
            border-bottom: 2px solid #ffffff;
        }
        .category-header {
            color: #444444;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            padding: 2.5rem 0 1rem 0;
        }
        .custom-check {
            width: 1.1rem;
            height: 1.1rem;
            background-color: #000000;
            border: 1px solid #333333;
            border-radius: 3px;
            cursor: pointer;
            accent-color: #ffffff;
            transition: transform 0.1s;
        }
        .custom-check:active { transform: scale(0.9); }
        
        #sigma-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
    </style>
</head>
<body class="p-6 md:p-16">

    <div id="sigma-modal" onclick="this.style.display='none'">
        <div class="text-9xl mb-6">🗿</div>
        <h2 class="text-6xl font-black italic tracking-tighter uppercase mb-2">CHAPTER DECIMATED</h2>
        <p class="text-zinc-500 font-bold tracking-[0.3em] uppercase text-xs">IIT BOMBAY IS THE ONLY GOAL</p>
    </div>

    <header class="max-w-5xl mx-auto mb-16">
        <div class="flex justify-between items-center mb-12">
            <h1 class="text-sm font-black tracking-widest uppercase">JEE PLANNER</h1>
            <div class="flex gap-6 text-[10px] font-bold text-zinc-500 uppercase tracking-widest">
                <span class="text-white">Focus</span>
                <span>History</span>
                <span>⚙️</span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-12">
            <div class="space-y-3">
                <div class="flex justify-between text-[10px] font-bold uppercase tracking-widest text-zinc-500">
                    <span>Mathematics</span>
                    <span id="math-perc-text">0% (0/31)</span>
                </div>
                <div class="progress-line"><div id="math-bar" class="progress-fill" style="width: 0%"></div></div>
            </div>
            <div class="space-y-3">
                <div class="flex justify-between text-[10px] font-bold uppercase tracking-widest text-zinc-500">
                    <span>Physics</span>
                    <span id="physics-perc-text">0% (0/34)</span>
                </div>
                <div class="progress-line"><div id="physics-bar" class="progress-fill" style="width: 0%"></div></div>
            </div>
            <div class="space-y-3">
                <div class="flex justify-between text-[10px] font-bold uppercase tracking-widest text-zinc-500">
                    <span>Chemistry</span>
                    <span id="chemistry-perc-text">0% (0/34)</span>
                </div>
                <div class="progress-line"><div id="chemistry-bar" class="progress-fill" style="width: 0%"></div></div>
            </div>
        </div>
    </header>

    <nav class="max-w-5xl mx-auto flex gap-10 mb-8 border-b border-zinc-900">
        <button onclick="switchSubject('math')" id="nav-math" class="subject-tab tab-active">MATH</button>
        <button onclick="switchSubject('physics')" id="nav-physics" class="subject-tab">PHYSICS</button>
        <button onclick="switchSubject('chemistry')" id="nav-chemistry" class="subject-tab">CHEMISTRY</button>
    </nav>

    <main class="max-w-5xl mx-auto">
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead class="text-[9px] font-black text-zinc-600 uppercase tracking-widest border-b border-zinc-900">
                    <tr>
                        <th class="pb-4 w-8">#</th>
                        <th class="pb-4">Chapter Name</th>
                        <th class="pb-4 text-center">Stat</th>
                        <th class="pb-4 text-center">PYQ (B)</th>
                        <th class="pb-4 text-center">PYQ (M)</th>
                        <th class="pb-4 text-center">Test</th>
                        <th class="pb-4 text-center">R1</th>
                        <th class="pb-4 text-center">R2</th>
                        <th class="pb-4 text-center">Form</th>
                    </tr>
                </thead>
                <tbody id="table-content">
                    </tbody>
            </table>
        </div>
    </main>

    <script>
        const jeeData = {
            math: {
                "Category 1": ["Matrices And Determinants", "Sequence And Series", "Straight Line", "Probability", "Complex Numbers", "Functions", "Indefinite Integration", "Mathematical Reasoning", "Statistics"],
                "Category 2": ["Vector 3D", "Binomial Theorem", "Application Of Derivatives", "Circle", "Definite Integration", "Differential Equation", "Parabola", "Area Under Curves", "Quadratic Equations", "Vector", "Limits"],
                "Category 3": ["Continutity And Differentiability", "Hyperbola", "Trigonometrical Ratios", "Heights And Distances", "Trigonometrical Equations", "Set Theory And Relations"],
                "Category 4": ["Permutation And Combination", "Ellipse", "Differentiation", "Inverse Trigonometric Functions", "Solution Of Triangle"]
            },
            physics: {
                "Category 1": ["Current Electricity", "Semiconductors", "Thermal Properties Of Matter", "Calorimetry", "Kinetic Theory Of Gases", "Properties Of Matter", "Fluid Mechanics", "Capacitance", "Gravitation", "Units And Dimensions", "Alternating Current", "Communication System"],
                "Category 2": ["Photoelectric Effect", "Electrostatics", "Rotational Motion", "Electromagnetic Waves", "Ray Optics", "Waves And Sound", "Oscillations", "Magnetic Effects Of Current", "Electromagnetic Induction", "Center Of Mass And Momentum"],
                "Category 3": ["Wave Optics", "Atomic Physics", "Work Power Energy", "Nuclear Physics", "Motion in Two Dimension", "Laws Of Motion"],
                "Category 4": ["Experimental Physics", "Motion In One Dimension", "Magnetism", "Heat Transfer", "Circular Motion", "Mathematics In Physics"]
            },
            chemistry: {
                "Category 1": ["Biomolecules", "Polymers", "P Block Elements", "Environmental Chemistry", "S Block & Hydrogen", "Mole Concept", "Surface Chemistry", "Atomic Structure", "Electrochemistry", "Metallurgy", "Solutions"],
                "Category 2": ["Coordination Compounds", "Chemical Thermodynamics", "General Organic Chemistry", "Hydrocarbons", "Haloalkanes", "Aldehydes And Ketones", "Amines", "Chemical Kinetics", "Chemical Bonding", "d and f block elements", "Haloarenes And Phenols"],
                "Category 3": ["Periodicity", "Solid State", "Gaseous State", "Purification Of Organic Compounds", "Chemistry in Everyday Life", "Chemical Equilibrium"],
                "Category 4": ["Alcohols Phenols And Ethers", "Carboxylic Acid And Its Derivatives", "lonic Equilibrium", "Aromatic Compounds", "Redox Reactions", "Qualitative Inorganic Chemistry"]
            }
        };

        let activeSub = 'math';
        const cols = ['stat', 'pyqb', 'pyqm', 'test', 'r1', 'r2', 'form'];

        function switchSubject(sub) {
            activeSub = sub;
            document.querySelectorAll('.subject-tab').forEach(t => t.classList.remove('tab-active'));
            document.getElementById(`nav-${sub}`).classList.add('tab-active');
            render();
        }

        function render() {
            const container = document.getElementById('table-content');
            container.innerHTML = '';
            let count = 1;

            for (const [cat, chapters] of Object.entries(jeeData[activeSub])) {
                container.insertAdjacentHTML('beforeend', `<tr><td colspan="9" class="category-header">${cat}</td></tr>`);
                
                chapters.forEach(name => {
                    const rowId = `${activeSub}-${count}`;
                    let html = `<tr class="border-b border-zinc-900/50 group hover:bg-zinc-900/30 transition-all">
                        <td class="py-5 text-[10px] text-zinc-700 font-bold">${count}</td>
                        <td class="py-5 text-[13px] font-semibold text-zinc-200">${name}</td>`;
                    
                    cols.forEach(col => {
                        const storageKey = `${rowId}-${col}`;
                        const isChecked = localStorage.getItem(storageKey) === 'true';
                        html += `<td class="py-5 text-center">
                            <input type="checkbox" ${isChecked ? 'checked' : ''} 
                                class="custom-check" 
                                onchange="handleToggle('${rowId}', '${col}', this)">
                        </td>`;
                    });
                    
                    html += `</tr>`;
                    container.insertAdjacentHTML('beforeend', html);
                    count++;
                });
            }
            refreshStats();
        }

        function handleToggle(rowId, col, el) {
            localStorage.setItem(`${rowId}-${col}`, el.checked);
            
            if (el.checked) {
                const allDone = cols.every(c => localStorage.getItem(`${rowId}-${c}`) === 'true');
                if (allDone) {
                    document.getElementById('sigma-modal').style.display = 'flex';
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                }
            }
            refreshStats();
        }

        function refreshStats() {
            ['math', 'physics', 'chemistry'].forEach(sub => {
                let totalTopics = 0;
                Object.values(jeeData[sub]).forEach(list => totalTopics += list.length);
                
                let totalBoxes = totalTopics * cols.length;
                let checkedBoxes = 0;
                let fullyCompletedChapters = 0;

                for (let i = 1; i <= totalTopics; i++) {
                    let rowFull = true;
                    cols.forEach(c => {
                        if (localStorage.getItem(`${sub}-${i}-${c}`) === 'true') {
                            checkedBoxes++;
                        } else {
                            rowFull = false;
                        }
                    });
                    if (rowFull) fullyCompletedChapters++;
                }

                const perc = Math.round((checkedBoxes / totalBoxes) * 100) || 0;
                document.getElementById(`${sub}-bar`).style.width = `${perc}%`;
                document.getElementById(`${sub}-perc-text`).innerText = `${perc}% (${fullyCompletedChapters}/${totalTopics})`;
            });
        }

        render();
    </script>
</body>
</html>
